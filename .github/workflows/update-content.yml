name: Update Content (News + Instagram)

on:
  schedule:
    # Meio-dia horario de Brasilia (UTC-3) = 15:00 UTC
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch fresh content
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: node scripts/update-content.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/ public/images/instagram-*.jpg
          if git diff --staged --quiet; then
            echo "No content changes to commit"
          else
            git commit -m "chore: update daily content (news + instagram)"
            git push
          fi
